<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WBA Calendar</title>
  <style>
    :root {
      --bg: #1a2520;
      --panel: rgba(255,255,255,0.09);
      --panel-strong: rgba(255,255,255,0.14);
      --line: rgba(255,255,255,0.16);
      --line-strong: rgba(255,255,255,0.28);
      --text: #eef2f0;
      --muted: #8a9b92;
      --soft: #c4d2ca;
      --green: #2bf59a;
      --green-dark: #0d8f5c;
      --aqua: #35d2d9;
      --yellow: #f3c969;
      --red: #ff6868;
      --violet: #b994ff;
      --radius: 8px;
      --shadow: 0 18px 50px rgba(0,0,0,0.22);
    }
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(43,245,154,0.12), transparent 32rem),
        radial-gradient(circle at 85% 2%,  rgba(53,210,217,0.09), transparent 28rem),
        linear-gradient(145deg, #1a2520 0%, #223530 54%, #1a2520 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.88), transparent 84%);
    }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button { border: 0; border-radius: var(--radius); cursor: pointer; }

    /* ── APP LAYOUT ── */
    .app { display: grid; grid-template-columns: 17.5rem minmax(0,1fr); min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column; gap: 1rem;
      padding: 1rem;
      background: rgba(22,34,28,0.82);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(20px);
    }
    .brand { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; }
    .brand-mark {
      display: grid; place-items: center;
      width: 2.7rem; height: 2.7rem;
      color: #06100c;
      background: linear-gradient(135deg, var(--green), var(--aqua));
      border-radius: var(--radius); font-weight: 900; font-size: 0.82rem;
    }
    .brand h1 { margin: 0; font-size: 1rem; line-height: 1.1; }
    .brand p { margin: 0.2rem 0 0; color: var(--muted); font-size: 0.8rem; }

    /* ── NAV ── */
    .nav { display: grid; gap: 0.45rem; }
    .nav button {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; min-height: 2.9rem; padding: 0.75rem 0.85rem;
      color: var(--muted); background: transparent;
      border: 1px solid transparent; font-weight: 760; text-align: left;
    }
    .nav button[aria-selected="true"] {
      color: var(--text); background: var(--panel);
      border-color: var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .nav button:hover:not([aria-selected="true"]) { color: var(--soft); background: rgba(255,255,255,0.04); }
    .nav-icon {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .nav-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.4rem; height: 1.4rem; padding: 0 0.28rem;
      background: rgba(43,245,154,0.16); color: var(--green);
      border-radius: 999px; font-size: 0.7rem; font-weight: 800;
    }

    /* ── SIDEBAR FOOTER ── */
    .sidebar-footer { margin-top: auto; display: grid; gap: 0.55rem; }
    .save-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .save-dot.ok { background: var(--green); }
    .save-dot.saving { background: var(--yellow); animation: pulse 0.75s infinite; }
    .save-dot.error { background: var(--red); }
    .save-label { font-size: 0.75rem; color: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .cfg-btn {
      display: flex; align-items: center; gap: 0.5rem;
      width: 100%; padding: 0.65rem 0.75rem;
      color: var(--muted); background: var(--panel);
      border: 1px solid var(--line); font-size: 0.82rem; font-weight: 700;
    }
    .cfg-btn:hover { color: var(--text); }

    /* ── MAIN ── */
    main { min-width: 0; padding: 1.25rem clamp(1rem,3vw,2rem) 2rem; }

    /* ── TOPLINE ── */
    .topline {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .eyebrow { margin: 0 0 0.45rem; color: var(--green); font-size: 0.78rem; font-weight: 850; text-transform: uppercase; letter-spacing: 0.06em; }
    h2 { margin: 0; font-size: clamp(2rem,5vw,4rem); line-height: 0.95; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.6rem; }

    /* ── BUTTONS ── */
    .btn {
      min-height: 2.6rem; padding: 0.72rem 0.95rem;
      color: #05100b; background: var(--green);
      font-weight: 850; box-shadow: 0 14px 34px rgba(43,245,154,0.16);
    }
    .btn.secondary { color: var(--text); background: var(--panel-strong); border: 1px solid var(--line); box-shadow: none; }
    .btn.ghost    { color: var(--muted); background: transparent; border: 1px solid var(--line); box-shadow: none; }
    .btn.danger   { color: #fff; background: rgba(255,104,104,0.2); border: 1px solid rgba(255,104,104,0.42); box-shadow: none; }
    .btn.small    { min-height: 2.1rem; padding: 0.42rem 0.72rem; font-size: 0.82rem; }

    /* ── MODULES ── */
    .module { display: none; }
    .module.active { display: block; }

    /* ─────────────────────────────────────────────
       CALENDAR
    ───────────────────────────────────────────── */
    .week-bar {
      display: flex; align-items: center; gap: 0.65rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .week-label {
      font-size: 0.88rem; font-weight: 750; color: var(--soft);
      padding: 0.45rem 0.9rem;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    }

    /* 6-column grid, Mon–Sat */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap: 0.8rem;
      align-items: start;
    }

    .cal-col {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      min-height: calc(100vh - 14rem);
    }
    .cal-col.today {
      border-color: rgba(43,245,154,0.5);
      background: rgba(43,245,154,0.05);
    }
    .cal-col.drag-over {
      border-color: rgba(43,245,154,0.7);
      background: rgba(43,245,154,0.1);
    }

    .cal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 0.9rem 0.7rem;
      border-bottom: 1px solid var(--line);
    }
    .cal-dayname {
      font-size: 0.72rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
    }
    .cal-daynum {
      font-size: 1.1rem; font-weight: 900;
      width: 2rem; height: 2rem; border-radius: 50%;
      display: grid; place-items: center;
    }
    .cal-col.today .cal-daynum {
      background: var(--green); color: #05100b;
    }

    .cal-body {
      padding: 0.65rem; flex: 1;
      display: flex; flex-direction: column; gap: 0.45rem;
    }

    /* Task card inside calendar — FULL SIZE */
    .task-card {
      padding: 0.7rem 0.8rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .task-card:hover {
      transform: translateY(-1px);
      border-color: rgba(43,245,154,0.5);
      background: rgba(43,245,154,0.07);
    }
    .task-card.done { opacity: 0.42; }
    .task-card.dragging { opacity: 0.35; transform: scale(0.95); }
    .task-card[draggable="true"] { cursor: grab; }
    .task-card[draggable="true"]:active { cursor: grabbing; }
    .task-card.done .tc-title { text-decoration: line-through; }

    .tc-row { display: flex; align-items: flex-start; gap: 0.55rem; }
    .tc-check {
      flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px;
      border: 1.5px solid var(--muted); border-radius: 4px;
      background: transparent; display: grid; place-items: center; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .tc-check.checked { background: var(--green); border-color: var(--green); }
    .tc-check.checked::after {
      content: "";
      display: block; width: 5px; height: 8px;
      border: 1.5px solid #05100b; border-top: 0; border-left: 0;
      transform: rotate(45deg) translate(-1px,-1px);
    }
    .tc-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; flex: 1; }
    .tc-tag {
      display: inline-flex; align-items: center;
      font-size: 0.68rem; font-weight: 800; padding: 0.15rem 0.45rem;
      border-radius: 999px; align-self: flex-start;
      color: var(--yellow);
      background: rgba(243,201,105,0.12);
      border: 1px solid rgba(243,201,105,0.3);
    }

    .add-day {
      margin-top: auto;
      width: 100%; padding: 0.5rem 0.6rem;
      background: transparent; border: 1px dashed rgba(255,255,255,0.12);
      border-radius: var(--radius); color: var(--muted);
      font-size: 0.8rem; text-align: left;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .add-day:hover {
      color: var(--green); border-color: rgba(43,245,154,0.38);
      background: rgba(43,245,154,0.05);
    }

    /* ─────────────────────────────────────────────
       SEGUIMIENTOS
    ───────────────────────────────────────────── */
    .seg-wrap { max-width: 56rem; display: grid; gap: 0.55rem; }
    .seg-empty { color: var(--muted); font-size: 0.9rem; padding: 2rem 0; }
    .seg-item {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.9rem 1.1rem;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); backdrop-filter: blur(18px);
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
    }
    .seg-item:hover {
      transform: translateY(-1px);
      border-color: rgba(243,201,105,0.5);
      background: rgba(243,201,105,0.06);
    }
    .seg-item.done { opacity: 0.42; }
    .seg-item.done .si-title { text-decoration: line-through; }
    .si-check {
      flex-shrink: 0; width: 18px; height: 18px;
      border: 1.5px solid var(--muted); border-radius: 5px;
      background: transparent; display: grid; place-items: center; cursor: pointer;
    }
    .si-check.checked { background: var(--green); border-color: var(--green); }
    .si-check.checked::after {
      content: "";
      display: block; width: 5px; height: 9px;
      border: 1.5px solid #05100b; border-top: 0; border-left: 0;
      transform: rotate(45deg) translate(-1px,-1px);
    }
    .si-title { flex: 1; font-size: 0.95rem; font-weight: 700; }
    .si-date  { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* ─────────────────────────────────────────────
       IDEAS
    ───────────────────────────────────────────── */
    .ideas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr));
      gap: 0.75rem;
    }
    .idea-card {
      padding: 1rem;
      background:
        linear-gradient(145deg, rgba(185,148,255,0.06), rgba(53,210,217,0.03)),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
    }
    .idea-card:hover {
      transform: translateY(-2px);
      border-color: rgba(185,148,255,0.5);
      background: rgba(185,148,255,0.08);
    }
    .idea-card-title {
      font-size: 1rem; font-weight: 800;
      margin: 0 0 0.45rem; line-height: 1.25;
    }
    .idea-card-note {
      font-size: 0.84rem; color: var(--muted);
      line-height: 1.5; margin: 0 0 0.65rem;
      overflow-wrap: anywhere;
    }
    .idea-card-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .idea-status {
      font-size: 0.68rem; font-weight: 800;
      padding: 0.18rem 0.5rem; border-radius: 999px;
      border: 1px solid;
    }
    .idea-status.pending  { color: var(--yellow); border-color: rgba(243,201,105,0.35); background: rgba(243,201,105,0.1); }
    .idea-status.progress { color: var(--aqua);   border-color: rgba(53,210,217,0.35);  background: rgba(53,210,217,0.1); }
    .idea-status.done     { color: var(--green);  border-color: rgba(43,245,154,0.35);  background: rgba(43,245,154,0.1); }
    .idea-status.blocked  { color: var(--red);    border-color: rgba(255,104,104,0.35); background: rgba(255,104,104,0.1); }
    .ideas-empty {
      grid-column: 1/-1; color: var(--muted);
      font-size: 0.88rem; padding: 2rem 0;
    }

    /* ─────────────────────────────────────────────
       BRAIN
    ───────────────────────────────────────────── */
    .brain-layout {
      display: grid;
      grid-template-columns: minmax(0,1fr) 21rem;
      gap: 1rem; align-items: start;
    }

    /* ── Orbital arena ── */
    .orbit-arena {
      position: relative; width: 100%;
      aspect-ratio: 1 / 0.72;
      background:
        radial-gradient(ellipse 60% 55% at 50% 50%, rgba(43,245,154,0.07), transparent 70%),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius)*1.5);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* orbit rings (SVG) */
    #orbitSvg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    /* nucleus */
    .nucleus {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 64px; height: 64px; border-radius: 50%;
      display: grid; place-items: center;
      background: radial-gradient(circle at 35% 35%, rgba(43,245,154,0.28), rgba(53,210,217,0.10));
      border: 1.5px solid rgba(43,245,154,0.6);
      box-shadow:
        0 0 0 8px rgba(43,245,154,0.06),
        0 0 0 18px rgba(43,245,154,0.03),
        0 0 32px rgba(43,245,154,0.25);
      font-size: 0.72rem; font-weight: 900; color: var(--green);
      letter-spacing: 0.05em;
      z-index: 10;
      animation: nucleusPulse 3s ease-in-out infinite;
    }
    @keyframes nucleusPulse {
      0%,100% { box-shadow: 0 0 0 8px rgba(43,245,154,0.06), 0 0 0 18px rgba(43,245,154,0.03), 0 0 32px rgba(43,245,154,0.25); }
      50%      { box-shadow: 0 0 0 12px rgba(43,245,154,0.09), 0 0 0 26px rgba(43,245,154,0.04), 0 0 48px rgba(43,245,154,0.35); }
    }

    /* orbit arm wrapper — rotates around centre */
    .orbit-arm {
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      transform-origin: 0 0;
      /* animation set inline per node */
    }

    /* the atom bead — sits at end of arm */
    .atom-bead {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      /* counter-rotate so bead stays upright */
      display: flex; align-items: center; justify-content: center;
    }
    /* idea bead */
    .atom-bead.idea {
      width: 14px; height: 14px;
      background: radial-gradient(circle at 35% 35%, rgba(185,148,255,0.9), rgba(140,100,220,0.7));
      border: 1px solid rgba(185,148,255,0.8);
      box-shadow: 0 0 10px rgba(185,148,255,0.5), 0 0 20px rgba(185,148,255,0.2);
    }
    .atom-bead.idea:hover {
      width: 18px; height: 18px;
      box-shadow: 0 0 16px rgba(185,148,255,0.7), 0 0 32px rgba(185,148,255,0.35);
    }
    /* task bead */
    .atom-bead.task {
      width: 10px; height: 10px;
      background: radial-gradient(circle at 35% 35%, rgba(53,210,217,0.9), rgba(20,160,170,0.7));
      border: 1px solid rgba(53,210,217,0.8);
      box-shadow: 0 0 8px rgba(53,210,217,0.5), 0 0 16px rgba(53,210,217,0.2);
    }
    .atom-bead.task.seg {
      background: radial-gradient(circle at 35% 35%, rgba(243,201,105,0.9), rgba(200,150,40,0.7));
      border-color: rgba(243,201,105,0.8);
      box-shadow: 0 0 8px rgba(243,201,105,0.5), 0 0 16px rgba(243,201,105,0.2);
    }
    .atom-bead.task:hover {
      width: 14px; height: 14px;
    }

    /* tooltip — hidden by default, shows on hover */
    .atom-tip {
      position: absolute;
      bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%);
      background: rgba(26,38,32,0.97);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      padding: 0.45rem 0.7rem;
      font-size: 0.76rem; font-weight: 700;
      color: var(--text); white-space: nowrap;
      max-width: 16rem; overflow: hidden; text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .atom-bead:hover .atom-tip { opacity: 1; }

    /* keep bead centred on the arm endpoint */
    .atom-bead { transform: translate(-50%, -50%); }
    .atom-bead:hover { transform: translate(-50%, -50%) scale(1.3); transition: transform 0.15s, width 0.15s, height 0.15s; }

    /* connection line from nucleus (SVG drawn inline) */

    /* ── Side panel ── */
    .brain-panel { display: grid; gap: 0.8rem; }
    .brain-card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); backdrop-filter: blur(18px);
      box-shadow: var(--shadow); padding: 1rem;
    }
    .bc-title {
      font-size: 0.76rem; font-weight: 850; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.75rem;
    }
    .bc-list { display: grid; gap: 0.4rem; }
    .bc-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.6rem 0.7rem;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
    }
    .bc-item:hover {
      transform: translateY(-1px);
      border-color: rgba(53,210,217,0.45);
      background: rgba(53,210,217,0.07);
    }
    .bc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .bc-body { flex: 1; min-width: 0; }
    .bc-name { font-size: 0.88rem; font-weight: 760; line-height: 1.25; overflow-wrap: anywhere; }
    .bc-sub  { font-size: 0.74rem; color: var(--muted); margin-top: 0.15rem; }
    .bc-del  {
      flex-shrink: 0; width: 1.5rem; height: 1.5rem;
      background: transparent; border: 1px solid transparent;
      color: var(--muted); font-size: 0.75rem;
      display: grid; place-items: center; border-radius: 5px;
    }
    .bc-del:hover { background: rgba(255,104,104,0.15); border-color: rgba(255,104,104,0.35); color: var(--red); }
    .bc-empty { font-size: 0.82rem; color: var(--muted); padding: 0.35rem 0; }

    /* ── DIALOGS ── */
    dialog {
      background: rgba(26,38,32,0.97); border: 1px solid var(--line-strong);
      border-radius: calc(var(--radius)*1.4); color: var(--text);
      padding: 1.5rem; width: 100%; max-width: 27rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.62);
      backdrop-filter: blur(20px);
    }
    dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
    dialog h3 { margin: 0 0 1.1rem; font-size: 1.05rem; font-weight: 800; }
    .field { display: grid; gap: 0.32rem; margin-bottom: 0.8rem; }
    .field label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.65rem 0.8rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line-strong); border-radius: var(--radius); color: var(--text);
    }
    .field textarea { resize: vertical; min-height: 4rem; }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: 2px solid rgba(43,245,154,0.55); border-color: transparent;
    }
    .dlg-footer { display: flex; gap: 0.55rem; justify-content: flex-end; margin-top: 1.1rem; }
    .dlg-footer-split { display: flex; justify-content: space-between; align-items: center; margin-top: 1.1rem; }

    /* ── TOKEN SCREEN ── */
    .token-screen {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(14,20,17,0.97); backdrop-filter: blur(14px);
      place-items: center;
    }
    .token-screen.visible { display: grid; }
    .token-box {
      background: rgba(30,42,36,0.98); border: 1px solid var(--line-strong);
      border-radius: 14px; padding: 2rem; width: 100%; max-width: 24rem;
      box-shadow: var(--shadow);
    }
    .token-box h2 { margin: 0 0 0.5rem; font-size: 1.15rem; font-weight: 850; }
    .token-box p  { margin: 0 0 1.1rem; color: var(--muted); font-size: 0.82rem; line-height: 1.5; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9998;
      padding: 0.65rem 1rem; border-radius: var(--radius);
      background: rgba(32,46,38,0.97); border: 1px solid var(--line-strong);
      font-size: 0.82rem; font-weight: 650;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s; pointer-events: none;
    }
    #toast.on { opacity: 1; transform: translateY(0); }

    /* ── SVG ICONS (inline) ── */
    svg { display: block; flex-shrink: 0; }
  </style>
</head>

<script>
// ── CONFIG ──
const DATA_FILE = 'data.json';
let GH_TOKEN = '', GH_REPO = 'mjonateca/WBA-CALENDAR', fileSha = null;
let dirty = false, autoTimer = null;

// ── STATE ──
let state = { tasks: [], nodes: [], ideas: [] };
let editTaskId = null, editNodeId = null, weekOffset = 0;

// ── HELPERS ──
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const $       = id  => document.getElementById(id);
const DAYS   = ['Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const fmt    = d  => d.toISOString().slice(0,10);
const disp   = ds => { const [,m,d]=ds.split('-'); return `${+d} ${MONTHS[+m-1]}`; };
const esc    = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── TOKEN ──
const DEFAULT_TOKEN = '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';
const DEFAULT_REPO  = 'mjonateca/WBA-CALENDAR';

function loadToken() {
  // Use stored token, fallback to hardcoded default
  GH_TOKEN = localStorage.getItem('wba_token') || DEFAULT_TOKEN;
  GH_REPO  = localStorage.getItem('wba_repo')  || DEFAULT_REPO;
  // Always persist so it survives refreshes
  localStorage.setItem('wba_token', GH_TOKEN);
  localStorage.setItem('wba_repo',  GH_REPO);
  $('repoInput').value = GH_REPO;
  // Never show token screen on load — token is pre-configured
}
function saveToken() {
  const t = $('tokenInput').value.trim() || DEFAULT_TOKEN;
  const r = $('repoInput').value.trim()  || DEFAULT_REPO;
  GH_TOKEN = t; GH_REPO = r;
  localStorage.setItem('wba_token', t); localStorage.setItem('wba_repo', r);
  $('tokenScreen').classList.remove('visible');
  loadFromGH();
}

// ── GITHUB ──
async function loadFromGH() {
  if (!GH_TOKEN) return;
  setStatus('saving','Cargando…');
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${DATA_FILE}`,
      { headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github+json' } });
    if (res.status === 404) { setStatus('ok','Nuevo'); render(); return; }
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    fileSha = data.sha;
    const dec = JSON.parse(atob(data.content.replace(/\n/g,'')));
    state = { tasks: dec.tasks||[], nodes: dec.nodes||[], ideas: dec.ideas||[] };
    setStatus('ok','Sincronizado');
  } catch(e) { setStatus('error','Error'); toast('Error: '+e.message); }
  seedOnce(); render();
}

async function push(silent) {
  if (!GH_TOKEN) { $('tokenScreen').classList.add('visible'); return; }
  setStatus('saving','Guardando…');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state,null,2))));
    const body = { message: `sync ${new Date().toISOString().slice(0,16).replace('T',' ')}`, content };
    if (fileSha) body.sha = fileSha;
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${DATA_FILE}`,{
      method:'PUT',
      headers:{ Authorization:`token ${GH_TOKEN}`, Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.message||res.status); }
    const data = await res.json();
    fileSha = data.content.sha; dirty = false;
    setStatus('ok','Guardado'); if(!silent) toast('Guardado en GitHub ✓');
  } catch(e){ setStatus('error','Error'); toast('Error: '+e.message); }
}

function markDirty() {
  dirty = true; setStatus('saving','Sin guardar');
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { if(dirty && GH_TOKEN) push(true); }, 4000);
}
function setStatus(type,label) {
  $('saveDot').className = 'save-dot '+type;
  $('saveLabel').textContent = label;
}

// ── NAV ──
function showMod(id, btn) {
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.setAttribute('aria-selected','false'));
  $('mod-'+id).classList.add('active'); btn.setAttribute('aria-selected','true');
  if(id==='brain') { orbitBuilt=false; setTimeout(buildOrbit,60); }
}

// ── WEEK ──
function getWeekDays() {
  const now = new Date(), dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow===0?6:dow-1) + weekOffset*7);
  return Array.from({length:6},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function changeWeek(d) { weekOffset+=d; renderCalendar(); }
function goToday()     { weekOffset=0; renderCalendar(); }

// ── RENDER ──
function render() {
  renderCalendar(); renderSeg(); renderIdeas(); renderBrainLists(); renderBadges();
  if($('mod-brain').classList.contains('active')) { orbitBuilt=false; setTimeout(buildOrbit,30); }
}

function renderBadges() {
  $('bCal').textContent   = state.tasks.filter(t=>!t.done).length;
  $('bSeg').textContent   = state.tasks.filter(t=>t.tag==='seguimiento'&&!t.done).length;
  $('bIdeas').textContent = state.ideas.filter(i=>i.status!=='done').length;
  $('bBrain').textContent = state.nodes.length + state.tasks.filter(t=>!t.done).length;
}

function renderCalendar() {
  const days = getWeekDays(), todayStr = fmt(new Date());
  const f=days[0], l=days[5];
  $('weekLabel').textContent = `${f.getDate()} ${MONTHS[f.getMonth()]} – ${l.getDate()} ${MONTHS[l.getMonth()]} ${l.getFullYear()}`;

  $('calGrid').innerHTML = days.map(day => {
    const ds = fmt(day), isToday = ds===todayStr;
    const tasks = state.tasks.filter(t=>t.date===ds);
    const cards = tasks.map(t=>`
      <div class="task-card ${t.done?'done':''}" draggable="true"
           ondragstart="onDragStart(event,'${t.id}')"
           ondragend="onDragEnd(event)"
           onclick="openEditTask('${t.id}')">
        <div class="tc-row">
          <div class="tc-check ${t.done?'checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')"></div>
          <span class="tc-title">${esc(t.title)}</span>
        </div>
        ${t.tag==='seguimiento'?`<div><span class="tc-tag">Seguimiento</span></div>`:''}
      </div>`).join('');

    return `
      <div class="cal-col ${isToday?'today':''}" data-date="${ds}"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${ds}')">
        <div class="cal-head">
          <span class="cal-dayname">${DAYS[day.getDay()-1]??'Sáb'}</span>
          <span class="cal-daynum">${day.getDate()}</span>
        </div>
        <div class="cal-body">
          ${cards||''}
          <button class="add-day" onclick="openAddTask('${ds}')">+ añadir tarea</button>
        </div>
      </div>`;
  }).join('');
}

function renderSeg() {
  const segs = state.tasks.filter(t=>t.tag==='seguimiento')
    .sort((a,b)=>(a.done-b.done)||a.date.localeCompare(b.date));
  const el = $('segList');
  if(!segs.length){ el.innerHTML=`<div class="seg-empty">No hay seguimientos activos.</div>`; return; }
  el.innerHTML = segs.map(t=>`
    <div class="seg-item ${t.done?'done':''}" onclick="openEditTask('${t.id}')">
      <div class="si-check ${t.done?'checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')"></div>
      <span class="si-title">${esc(t.title)}</span>
      <span class="si-date">${disp(t.date)}</span>
    </div>`).join('');
}

function renderBrainLists() {
  const il = $('brainIdeaList');
  const allBrainIdeas = [...state.nodes, ...state.ideas.filter(i=>i.status!=='done')];
  il.innerHTML = allBrainIdeas.length
    ? allBrainIdeas.map(n=>`
        <div class="bc-item">
          <div class="bc-dot" style="background:var(--violet)"></div>
          <div class="bc-body">
            <div class="bc-name">${esc(n.title)}</div>
            ${n.note?`<div class="bc-sub">${esc(n.note.slice(0,55))}${n.note.length>55?'…':''}</div>`:''}
          </div>
          <button class="bc-del" onclick="openEditNode('${n.id}')">✎</button>
        </div>`).join('')
    : `<div class="bc-empty">Sin ideas aún.</div>`;

  const tl = $('brainTaskList');
  const active = state.tasks.filter(t=>!t.done).slice(0,10);
  tl.innerHTML = active.length
    ? active.map(t=>`
        <div class="bc-item">
          <div class="bc-dot" style="background:${t.tag==='seguimiento'?'var(--yellow)':'var(--aqua)'}"></div>
          <div class="bc-body">
            <div class="bc-name">${esc(t.title)}</div>
            <div class="bc-sub">${disp(t.date)}${t.tag?' · '+t.tag:''}</div>
          </div>
        </div>`).join('')
    : `<div class="bc-empty">Sin tareas activas.</div>`;
}

// ── ORBIT ──
let orbitAF = null, orbitAngles = {}, orbitSpeeds = {};
let orbitBuilt = false;

function initOrbit() {
  orbitBuilt = false;
  if(orbitAF) cancelAnimationFrame(orbitAF);
  buildOrbit();
}

function buildOrbit() {
  const arena = $('orbitArena');
  if(!arena) return;
  const W = arena.offsetWidth, H = arena.offsetHeight;
  const cx = W/2, cy = H/2;

  const ideas = [...state.nodes, ...state.ideas.filter(i=>i.status!=='done')];
  const tasks  = state.tasks.filter(t=>!t.done).slice(0,14);

  // Three orbital rings
  const R1 = Math.min(W,H) * 0.22;  // inner  — ideas
  const R2 = Math.min(W,H) * 0.36;  // middle — tasks
  const R3 = Math.min(W,H) * 0.46;  // outer  — overflow tasks

  // SVG rings
  const svg = $('orbitSvg');
  svg.innerHTML = [R1,R2,R3].map((r,i) => {
    const op = [0.12, 0.09, 0.06][i];
    const da = ['4 6','3 8','2 9'][i];
    return `<ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="${r*0.42}"
      fill="none" stroke="rgba(43,245,154,${op})" stroke-width="1"
      stroke-dasharray="${da}"/>`;
  }).join('') +
  // faint connection lines from nucleus to each idea node (drawn as SVG)
  ideas.map((n,i) => {
    const angle = orbitAngles['i'+n.id] ?? (i/Math.max(ideas.length,1))*Math.PI*2;
    const x = cx + Math.cos(angle)*R1;
    const y = cy + Math.sin(angle)*R1*0.42;
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"
      stroke="rgba(185,148,255,0.12)" stroke-width="1"/>`;
  }).join('');

  // Container for beads
  const arms = $('orbitArms');
  arms.innerHTML = '';

  // Init angles + speeds once
  ideas.forEach((n,i) => {
    if(orbitAngles['i'+n.id] === undefined) {
      orbitAngles['i'+n.id] = (i/Math.max(ideas.length,1)) * Math.PI*2;
      orbitSpeeds['i'+n.id] = 0.0008 + i*0.00006;
    }
  });
  tasks.forEach((t,i) => {
    if(orbitAngles['t'+t.id] === undefined) {
      orbitAngles['t'+t.id] = (i/Math.max(tasks.length,1)) * Math.PI*2;
      orbitSpeeds['t'+t.id] = 0.0005 + i*0.00004;
    }
  });

  // Place beads
  function placeBead(angle, rx, ry, label, cls, onClick) {
    const x = cx + Math.cos(angle) * rx;
    const y = cy + Math.sin(angle) * ry;
    const bead = document.createElement('div');
    bead.className = 'atom-bead ' + cls;
    bead.style.left = x + 'px';
    bead.style.top  = y + 'px';
    bead.style.position = 'absolute';
    // Tooltip
    const tip = document.createElement('div');
    tip.className = 'atom-tip';
    tip.textContent = label;
    bead.appendChild(tip);
    if(onClick) bead.addEventListener('click', onClick);
    arms.appendChild(bead);
    return bead;
  }

  // Render all beads
  ideas.forEach((n,i) => {
    placeBead(orbitAngles['i'+n.id], R1, R1*0.42, n.title, 'idea', ()=>openEditNode(n.id));
  });
  tasks.forEach((t,i) => {
    const r = i < 8 ? R2 : R3;
    const cls = 'task' + (t.tag==='seguimiento'?' seg':'');
    placeBead(orbitAngles['t'+t.id], r, r*0.42, t.title, cls, ()=>openEditTask(t.id));
  });

  orbitBuilt = true;
  animateOrbit();
}

function animateOrbit() {
  const arena = $('orbitArena');
  if(!arena || !orbitBuilt) return;

  const W = arena.offsetWidth, H = arena.offsetHeight;
  const cx = W/2, cy = H/2;
  const ideas = [...state.nodes, ...state.ideas.filter(i=>i.status!=='done')];
  const tasks  = state.tasks.filter(t=>!t.done).slice(0,14);

  const R1 = Math.min(W,H)*0.22;
  const R2 = Math.min(W,H)*0.36;
  const R3 = Math.min(W,H)*0.46;

  // Tick angles
  ideas.forEach(n => { if(orbitSpeeds['i'+n.id]) orbitAngles['i'+n.id] += orbitSpeeds['i'+n.id]; });
  tasks.forEach(t  => { if(orbitSpeeds['t'+t.id]) orbitAngles['t'+t.id] += orbitSpeeds['t'+t.id]; });

  // Move beads
  const beads = $('orbitArms').querySelectorAll('.atom-bead');
  let bIdx = 0;
  ideas.forEach((n,i) => {
    const a = orbitAngles['i'+n.id];
    const x = cx + Math.cos(a)*R1;
    const y = cy + Math.sin(a)*R1*0.42;
    if(beads[bIdx]) { beads[bIdx].style.left=x+'px'; beads[bIdx].style.top=y+'px'; }
    bIdx++;
  });
  tasks.forEach((t,i) => {
    const r = i < 8 ? R2 : R3;
    const a = orbitAngles['t'+t.id];
    const x = cx + Math.cos(a)*r;
    const y = cy + Math.sin(a)*r*0.42;
    if(beads[bIdx]) { beads[bIdx].style.left=x+'px'; beads[bIdx].style.top=y+'px'; }
    bIdx++;
  });

  // Update SVG lines for ideas
  const svg = $('orbitSvg');
  const lines = svg.querySelectorAll('line');
  ideas.forEach((n,i) => {
    const a = orbitAngles['i'+n.id];
    const x = cx + Math.cos(a)*R1;
    const y = cy + Math.sin(a)*R1*0.42;
    if(lines[i]) { lines[i].setAttribute('x2',x); lines[i].setAttribute('y2',y); }
  });

  orbitAF = requestAnimationFrame(animateOrbit);
}

// ── DRAG & DROP ──
let dragId = null;

function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  requestAnimationFrame(() => e.target.classList.add('dragging'));
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.cal-col.drag-over').forEach(c => c.classList.remove('drag-over'));
  dragId = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.target.closest('.cal-col');
  if (col && !col.classList.contains('drag-over')) {
    document.querySelectorAll('.cal-col.drag-over').forEach(c => c.classList.remove('drag-over'));
    col.classList.add('drag-over');
  }
}

function onDragLeave(e) {
  const col = e.target.closest('.cal-col');
  if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
}

function onDrop(e, dateStr) {
  e.preventDefault();
  document.querySelectorAll('.cal-col.drag-over').forEach(c => c.classList.remove('drag-over'));
  const id = e.dataTransfer.getData('text/plain') || dragId;
  if (!id) return;
  const t = state.tasks.find(x => x.id === id);
  if (t && t.date !== dateStr) {
    t.date = dateStr;
    markDirty();
    render();
    toast('Tarea movida a ' + disp(dateStr));
  }
  dragId = null;
}

// ── TASK CRUD ──
function openAddTask(ds) {
  editTaskId = null;
  $('tDlgTitle').textContent = 'Nueva tarea';
  $('tTitle').value = '';
  $('tDate').value  = ds||fmt(new Date());
  $('tTag').value   = '';
  $('tDelBtn').style.display = 'none';
  $('taskDlg').showModal();
}
function openEditTask(id) {
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  editTaskId = id;
  $('tDlgTitle').textContent = 'Editar tarea';
  $('tTitle').value = t.title; $('tDate').value = t.date; $('tTag').value = t.tag||'';
  $('tDelBtn').style.display = '';
  $('taskDlg').showModal();
}
function saveTask() {
  const title=$('tTitle').value.trim(), date=$('tDate').value;
  if(!title||!date){ toast('Introduce título y fecha'); return; }
  // Auto-classify as seguimiento if title contains the word
  const autoSeg = /seguimiento/i.test(title);
  const tag = autoSeg ? 'seguimiento' : $('tTag').value;
  if(editTaskId) {
    const t=state.tasks.find(x=>x.id===editTaskId);
    if(t){ t.title=title; t.date=date; t.tag=tag; }
  } else {
    state.tasks.push({id:uid(),title,date,tag,done:false});
  }
  closeDlg('taskDlg'); markDirty(); render();
}
function deleteTask() {
  if(!editTaskId) return;
  state.tasks = state.tasks.filter(x=>x.id!==editTaskId);
  closeDlg('taskDlg'); markDirty(); render();
}
function toggleTask(id) {
  const t=state.tasks.find(x=>x.id===id);
  if(t){ t.done=!t.done; markDirty(); render(); }
}

// ── IDEAS CRUD ──
let editIdeaId = null;
const STATUS_LABELS = { pending:'Pendiente', progress:'En curso', done:'Hecha', blocked:'Bloqueada' };

function renderIdeas() {
  const grid = $('ideasGrid');
  if(!state.ideas.length) {
    grid.innerHTML = '<div class="ideas-empty">Sin ideas todavia. Crea la primera.</div>';
    return;
  }
  grid.innerHTML = state.ideas.map(i => `
    <div class="idea-card" onclick="openEditIdea('${i.id}')">
      <div class="idea-card-title">${esc(i.title)}</div>
      ${i.note ? `<div class="idea-card-note">${esc(i.note)}</div>` : ''}
      <div class="idea-card-meta">
        <span class="idea-status ${i.status||'pending'}">${STATUS_LABELS[i.status]||'Pendiente'}</span>
      </div>
    </div>`).join('');
}

function openAddIdea() {
  editIdeaId = null;
  $('iDlgTitle').textContent = 'Nueva idea';
  $('iTitle').value = ''; $('iNote').value = ''; $('iStatus').value = 'pending';
  $('iDelBtn').style.display = 'none';
  $('ideaDlg').showModal();
}
function openEditIdea(id) {
  const i = state.ideas.find(x=>x.id===id); if(!i) return;
  editIdeaId = id;
  $('iDlgTitle').textContent = 'Editar idea';
  $('iTitle').value = i.title; $('iNote').value = i.note||''; $('iStatus').value = i.status||'pending';
  $('iDelBtn').style.display = '';
  $('ideaDlg').showModal();
}
function saveIdea() {
  const title = $('iTitle').value.trim();
  if(!title) { toast('Introduce un titulo'); return; }
  const note = $('iNote').value.trim(), status = $('iStatus').value;
  if(editIdeaId) {
    const i = state.ideas.find(x=>x.id===editIdeaId);
    if(i) { i.title=title; i.note=note; i.status=status; }
  } else {
    state.ideas.push({ id:uid(), title, note, status });
  }
  closeDlg('ideaDlg'); markDirty(); render();
}
function deleteIdea() {
  if(!editIdeaId) return;
  state.ideas = state.ideas.filter(x=>x.id!==editIdeaId);
  closeDlg('ideaDlg'); markDirty(); render();
}

// ── NODE CRUD ──
function openAddNode() {
  editNodeId=null; $('nDlgTitle').textContent='Nueva idea';
  $('nTitle').value=''; $('nNote').value='';
  $('nDelBtn').style.display='none'; $('nodeDlg').showModal();
}
function openEditNode(id) {
  const n=state.nodes.find(x=>x.id===id); if(!n) return;
  editNodeId=id; $('nDlgTitle').textContent='Editar idea';
  $('nTitle').value=n.title; $('nNote').value=n.note||'';
  $('nDelBtn').style.display=''; $('nodeDlg').showModal();
}
function saveNode() {
  const title=$('nTitle').value.trim(); if(!title){ toast('Introduce un título'); return; }
  const note=$('nNote').value.trim();
  if(editNodeId){ const n=state.nodes.find(x=>x.id===editNodeId); if(n){n.title=title;n.note=note;} }
  else state.nodes.push({id:uid(),title,note});
  closeDlg('nodeDlg'); markDirty(); render();
}
function deleteNode() {
  if(!editNodeId) return;
  state.nodes=state.nodes.filter(x=>x.id!==editNodeId);
  closeDlg('nodeDlg'); markDirty(); render();
}

// ── UTILS ──
function closeDlg(id) { $(id).close(); }
['taskDlg','nodeDlg','ideaDlg'].forEach(id=>$(id).addEventListener('click',e=>{ if(e.target===$(id)) $(id).close(); }));

function toast(msg) {
  const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('on'),2600);
}

function seedOnce() {
  if(state.tasks.length>0) return;
  const now=new Date(), dow=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(dow===0?6:dow-1));
  const wd=n=>{ const d=new Date(mon); d.setDate(mon.getDate()+n); return fmt(d); };
  state.tasks=[
    {id:uid(),title:'Compartir post Ofi-Despedida Ana',               date:wd(2),tag:'',           done:false},
    {id:uid(),title:'Enviar Propuestas SGAs',                          date:wd(2),tag:'',           done:false},
    {id:uid(),title:'Seguimiento Cambios Bikinis Samantha Agua Menta', date:wd(2),tag:'seguimiento',done:false},
    {id:uid(),title:'Seguimiento Sandalias roxy Alexandra',            date:wd(4),tag:'seguimiento',done:false},
  ];
}
