<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WBA Calendar</title>
  <style>
    :root {
      --bg: #080a09;
      --panel: rgba(255,255,255,0.075);
      --panel-strong: rgba(255,255,255,0.12);
      --line: rgba(255,255,255,0.16);
      --line-strong: rgba(255,255,255,0.28);
      --text: #f4f7f5;
      --muted: #aab5af;
      --soft: #dce5e0;
      --green: #2bf59a;
      --green-dark: #0d8f5c;
      --aqua: #35d2d9;
      --yellow: #f3c969;
      --red: #ff6868;
      --violet: #b994ff;
      --radius: 8px;
      --shadow: 0 24px 70px rgba(0,0,0,0.34);
    }
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(43,245,154,0.18), transparent 30rem),
        radial-gradient(circle at 85% 2%,  rgba(53,210,217,0.13), transparent 28rem),
        linear-gradient(145deg, #080a09 0%, #0e1510 54%, #080a09 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.88), transparent 84%);
    }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button { border: 0; border-radius: var(--radius); cursor: pointer; }

    /* ── APP LAYOUT ── */
    .app { display: grid; grid-template-columns: 17.5rem minmax(0,1fr); min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky; top: 0; height: 100vh;
      display: flex; flex-direction: column; gap: 1rem;
      padding: 1rem;
      background: rgba(8,10,9,0.72);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(20px);
    }
    .brand { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; }
    .brand-mark {
      display: grid; place-items: center;
      width: 2.7rem; height: 2.7rem;
      color: #06100c;
      background: linear-gradient(135deg, var(--green), var(--aqua));
      border-radius: var(--radius); font-weight: 900; font-size: 0.82rem;
    }
    .brand h1 { margin: 0; font-size: 1rem; line-height: 1.1; }
    .brand p { margin: 0.2rem 0 0; color: var(--muted); font-size: 0.8rem; }

    /* ── NAV ── */
    .nav { display: grid; gap: 0.45rem; }
    .nav button {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; min-height: 2.9rem; padding: 0.75rem 0.85rem;
      color: var(--muted); background: transparent;
      border: 1px solid transparent; font-weight: 760; text-align: left;
    }
    .nav button[aria-selected="true"] {
      color: var(--text); background: var(--panel);
      border-color: var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .nav button:hover:not([aria-selected="true"]) { color: var(--soft); background: rgba(255,255,255,0.04); }
    .nav-icon {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .nav-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.4rem; height: 1.4rem; padding: 0 0.28rem;
      background: rgba(43,245,154,0.16); color: var(--green);
      border-radius: 999px; font-size: 0.7rem; font-weight: 800;
    }

    /* ── SIDEBAR FOOTER ── */
    .sidebar-footer { margin-top: auto; display: grid; gap: 0.55rem; }
    .save-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .save-dot.ok { background: var(--green); }
    .save-dot.saving { background: var(--yellow); animation: pulse 0.75s infinite; }
    .save-dot.error { background: var(--red); }
    .save-label { font-size: 0.75rem; color: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .cfg-btn {
      display: flex; align-items: center; gap: 0.5rem;
      width: 100%; padding: 0.65rem 0.75rem;
      color: var(--muted); background: var(--panel);
      border: 1px solid var(--line); font-size: 0.82rem; font-weight: 700;
    }
    .cfg-btn:hover { color: var(--text); }

    /* ── MAIN ── */
    main { min-width: 0; padding: 1.25rem clamp(1rem,3vw,2rem) 2rem; }

    /* ── TOPLINE ── */
    .topline {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .eyebrow { margin: 0 0 0.45rem; color: var(--green); font-size: 0.78rem; font-weight: 850; text-transform: uppercase; letter-spacing: 0.06em; }
    h2 { margin: 0; font-size: clamp(2rem,5vw,4rem); line-height: 0.95; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.6rem; }

    /* ── BUTTONS ── */
    .btn {
      min-height: 2.6rem; padding: 0.72rem 0.95rem;
      color: #05100b; background: var(--green);
      font-weight: 850; box-shadow: 0 14px 34px rgba(43,245,154,0.16);
    }
    .btn.secondary { color: var(--text); background: var(--panel-strong); border: 1px solid var(--line); box-shadow: none; }
    .btn.ghost    { color: var(--muted); background: transparent; border: 1px solid var(--line); box-shadow: none; }
    .btn.danger   { color: #fff; background: rgba(255,104,104,0.2); border: 1px solid rgba(255,104,104,0.42); box-shadow: none; }
    .btn.small    { min-height: 2.1rem; padding: 0.42rem 0.72rem; font-size: 0.82rem; }

    /* ── MODULES ── */
    .module { display: none; }
    .module.active { display: block; }

    /* ─────────────────────────────────────────────
       CALENDAR
    ───────────────────────────────────────────── */
    .week-bar {
      display: flex; align-items: center; gap: 0.65rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .week-label {
      font-size: 0.88rem; font-weight: 750; color: var(--soft);
      padding: 0.45rem 0.9rem;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    }

    /* 6-column grid, Mon–Sat */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0,1fr));
      gap: 0.8rem;
      align-items: start;
    }

    .cal-col {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      min-height: calc(100vh - 14rem);
    }
    .cal-col.today {
      border-color: rgba(43,245,154,0.5);
      background: rgba(43,245,154,0.05);
    }

    .cal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 0.9rem 0.7rem;
      border-bottom: 1px solid var(--line);
    }
    .cal-dayname {
      font-size: 0.72rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
    }
    .cal-daynum {
      font-size: 1.1rem; font-weight: 900;
      width: 2rem; height: 2rem; border-radius: 50%;
      display: grid; place-items: center;
    }
    .cal-col.today .cal-daynum {
      background: var(--green); color: #05100b;
    }

    .cal-body {
      padding: 0.65rem; flex: 1;
      display: flex; flex-direction: column; gap: 0.45rem;
    }

    /* Task card inside calendar — FULL SIZE */
    .task-card {
      padding: 0.7rem 0.8rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .task-card:hover {
      transform: translateY(-1px);
      border-color: rgba(43,245,154,0.5);
      background: rgba(43,245,154,0.07);
    }
    .task-card.done { opacity: 0.42; }
    .task-card.done .tc-title { text-decoration: line-through; }

    .tc-row { display: flex; align-items: flex-start; gap: 0.55rem; }
    .tc-check {
      flex-shrink: 0; width: 16px; height: 16px; margin-top: 2px;
      border: 1.5px solid var(--muted); border-radius: 4px;
      background: transparent; display: grid; place-items: center; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .tc-check.checked { background: var(--green); border-color: var(--green); }
    .tc-check.checked::after {
      content: "";
      display: block; width: 5px; height: 8px;
      border: 1.5px solid #05100b; border-top: 0; border-left: 0;
      transform: rotate(45deg) translate(-1px,-1px);
    }
    .tc-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; flex: 1; }
    .tc-tag {
      display: inline-flex; align-items: center;
      font-size: 0.68rem; font-weight: 800; padding: 0.15rem 0.45rem;
      border-radius: 999px; align-self: flex-start;
      color: var(--yellow);
      background: rgba(243,201,105,0.12);
      border: 1px solid rgba(243,201,105,0.3);
    }

    .add-day {
      margin-top: auto;
      width: 100%; padding: 0.5rem 0.6rem;
      background: transparent; border: 1px dashed rgba(255,255,255,0.12);
      border-radius: var(--radius); color: var(--muted);
      font-size: 0.8rem; text-align: left;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .add-day:hover {
      color: var(--green); border-color: rgba(43,245,154,0.38);
      background: rgba(43,245,154,0.05);
    }

    /* ─────────────────────────────────────────────
       SEGUIMIENTOS
    ───────────────────────────────────────────── */
    .seg-wrap { max-width: 56rem; display: grid; gap: 0.55rem; }
    .seg-empty { color: var(--muted); font-size: 0.9rem; padding: 2rem 0; }
    .seg-item {
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.9rem 1.1rem;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); backdrop-filter: blur(18px);
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
    }
    .seg-item:hover {
      transform: translateY(-1px);
      border-color: rgba(243,201,105,0.5);
      background: rgba(243,201,105,0.06);
    }
    .seg-item.done { opacity: 0.42; }
    .seg-item.done .si-title { text-decoration: line-through; }
    .si-check {
      flex-shrink: 0; width: 18px; height: 18px;
      border: 1.5px solid var(--muted); border-radius: 5px;
      background: transparent; display: grid; place-items: center; cursor: pointer;
    }
    .si-check.checked { background: var(--green); border-color: var(--green); }
    .si-check.checked::after {
      content: "";
      display: block; width: 5px; height: 9px;
      border: 1.5px solid #05100b; border-top: 0; border-left: 0;
      transform: rotate(45deg) translate(-1px,-1px);
    }
    .si-title { flex: 1; font-size: 0.95rem; font-weight: 700; }
    .si-date  { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* ─────────────────────────────────────────────
       BRAIN — same panel/card aesthetic as original
    ───────────────────────────────────────────── */
    .brain-layout {
      display: grid;
      grid-template-columns: minmax(0,1fr) 22rem;
      gap: 1.2rem; align-items: start;
    }

    /* Orbital arena */
    .orbit-arena {
      position: relative; width: 100%; aspect-ratio: 1 / 0.78;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius)*1.5);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    /* subtle radial centre glow */
    .orbit-arena::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 55% 45% at 50% 50%, rgba(43,245,154,0.10), transparent 70%);
    }

    /* SVG rings + nodes rendered inside */
    #orbitSvg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }

    /* Core nucleus */
    .nucleus {
      position: absolute; transform: translate(-50%,-50%);
      top: 50%; left: 50%;
      width: 72px; height: 72px; border-radius: 50%;
      display: grid; place-items: center;
      background: linear-gradient(135deg, rgba(43,245,154,0.18), rgba(53,210,217,0.14));
      border: 1.5px solid rgba(43,245,154,0.55);
      box-shadow: 0 0 36px rgba(43,245,154,0.22), inset 0 1px 0 rgba(255,255,255,0.12);
      font-size: 0.78rem; font-weight: 900; color: var(--green);
      letter-spacing: 0.04em; pointer-events: none;
    }

    /* Orbiting node pill */
    .orbit-node {
      position: absolute;
      transform: translate(-50%,-50%);
      white-space: nowrap;
      cursor: pointer;
    }
    .orbit-node-inner {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.38rem 0.7rem;
      background: rgba(255,255,255,0.085);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      font-size: 0.78rem; font-weight: 700;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
      backdrop-filter: blur(12px);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      max-width: 14rem; overflow: hidden; text-overflow: ellipsis;
    }
    .orbit-node-inner:hover {
      background: rgba(43,245,154,0.13);
      border-color: rgba(43,245,154,0.55);
      transform: scale(1.04);
    }
    .orbit-node-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* task nodes (outer orbit) are smaller */
    .orbit-node.task .orbit-node-inner {
      padding: 0.28rem 0.55rem; font-size: 0.7rem; font-weight: 600;
      background: rgba(255,255,255,0.055);
      border-color: rgba(255,255,255,0.11);
    }

    /* Side panel — same card style */
    .brain-panel { display: grid; gap: 0.8rem; }

    .brain-card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: var(--radius); backdrop-filter: blur(18px);
      box-shadow: var(--shadow); padding: 1rem;
    }
    .bc-title {
      font-size: 0.78rem; font-weight: 850; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.75rem;
    }
    .bc-list { display: grid; gap: 0.45rem; }
    .bc-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.6rem 0.7rem;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); cursor: pointer;
      transition: transform 140ms, border-color 140ms, background 140ms;
    }
    .bc-item:hover {
      transform: translateY(-1px);
      border-color: rgba(53,210,217,0.45);
      background: rgba(53,210,217,0.07);
    }
    .bc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .bc-body { flex: 1; min-width: 0; }
    .bc-name { font-size: 0.88rem; font-weight: 760; line-height: 1.25; overflow-wrap: anywhere; }
    .bc-sub  { font-size: 0.74rem; color: var(--muted); margin-top: 0.15rem; }
    .bc-del  {
      flex-shrink: 0; width: 1.5rem; height: 1.5rem;
      background: transparent; border: 1px solid transparent;
      color: var(--muted); font-size: 0.75rem;
      display: grid; place-items: center; border-radius: 5px;
    }
    .bc-del:hover { background: rgba(255,104,104,0.15); border-color: rgba(255,104,104,0.35); color: var(--red); }
    .bc-empty { font-size: 0.82rem; color: var(--muted); padding: 0.35rem 0; }

    /* ── DIALOGS ── */
    dialog {
      background: rgba(10,14,11,0.97); border: 1px solid var(--line-strong);
      border-radius: calc(var(--radius)*1.4); color: var(--text);
      padding: 1.5rem; width: 100%; max-width: 27rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.62);
      backdrop-filter: blur(20px);
    }
    dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
    dialog h3 { margin: 0 0 1.1rem; font-size: 1.05rem; font-weight: 800; }
    .field { display: grid; gap: 0.32rem; margin-bottom: 0.8rem; }
    .field label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .field input, .field select, .field textarea {
      width: 100%; padding: 0.65rem 0.8rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line-strong); border-radius: var(--radius); color: var(--text);
    }
    .field textarea { resize: vertical; min-height: 4rem; }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: 2px solid rgba(43,245,154,0.55); border-color: transparent;
    }
    .dlg-footer { display: flex; gap: 0.55rem; justify-content: flex-end; margin-top: 1.1rem; }
    .dlg-footer-split { display: flex; justify-content: space-between; align-items: center; margin-top: 1.1rem; }

    /* ── TOKEN SCREEN ── */
    .token-screen {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(8,10,9,0.97); backdrop-filter: blur(14px);
      place-items: center;
    }
    .token-screen.visible { display: grid; }
    .token-box {
      background: rgba(12,16,13,0.98); border: 1px solid var(--line-strong);
      border-radius: 14px; padding: 2rem; width: 100%; max-width: 24rem;
      box-shadow: var(--shadow);
    }
    .token-box h2 { margin: 0 0 0.5rem; font-size: 1.15rem; font-weight: 850; }
    .token-box p  { margin: 0 0 1.1rem; color: var(--muted); font-size: 0.82rem; line-height: 1.5; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9998;
      padding: 0.65rem 1rem; border-radius: var(--radius);
      background: rgba(14,20,15,0.97); border: 1px solid var(--line-strong);
      font-size: 0.82rem; font-weight: 650;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s; pointer-events: none;
    }
    #toast.on { opacity: 1; transform: translateY(0); }

    /* ── SVG ICONS (inline) ── */
    svg { display: block; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Token -->
<div class="token-screen" id="tokenScreen">
  <div class="token-box">
    <h2>Configurar acceso</h2>
    <p>Introduce tu GitHub Personal Access Token para sincronizar los datos con el repositorio.</p>
    <div class="field"><label>GitHub Token</label><input type="password" id="tokenInput" placeholder="github_pat_…"></div>
    <div class="field"><label>Repositorio</label><input type="text" id="repoInput" value="mjonateca/WBA-CALENDAR"></div>
    <div style="display:flex;gap:0.5rem;margin-top:0.8rem">
      <button class="btn" style="flex:1" onclick="saveToken()">Guardar y continuar</button>
    </div>
  </div>
</div>

<!-- Task dialog -->
<dialog id="taskDlg">
  <h3 id="tDlgTitle">Nueva tarea</h3>
  <div class="field"><label>Tarea</label><input type="text" id="tTitle" placeholder="Descripción…"></div>
  <div class="field"><label>Fecha</label><input type="date" id="tDate"></div>
  <div class="field">
    <label>Categoría</label>
    <select id="tTag">
      <option value="">Sin categoría</option>
      <option value="seguimiento">Seguimiento</option>
    </select>
  </div>
  <div class="dlg-footer-split">
    <button class="btn danger small" id="tDelBtn" onclick="deleteTask()" style="display:none">Eliminar</button>
    <div style="display:flex;gap:0.5rem;margin-left:auto">
      <button class="btn ghost small" onclick="closeDlg('taskDlg')">Cancelar</button>
      <button class="btn small" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</dialog>

<!-- Node dialog -->
<dialog id="nodeDlg">
  <h3 id="nDlgTitle">Nueva idea</h3>
  <div class="field"><label>Título</label><input type="text" id="nTitle" placeholder="Nombre de la idea…"></div>
  <div class="field"><label>Nota</label><textarea id="nNote" placeholder="En qué consiste…"></textarea></div>
  <div class="dlg-footer-split">
    <button class="btn danger small" id="nDelBtn" onclick="deleteNode()" style="display:none">Eliminar</button>
    <div style="display:flex;gap:0.5rem;margin-left:auto">
      <button class="btn ghost small" onclick="closeDlg('nodeDlg')">Cancelar</button>
      <button class="btn small" onclick="saveNode()">Guardar</button>
    </div>
  </div>
</dialog>

<div class="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="brand">
      <div class="brand-mark">WBA</div>
      <div>
        <h1>WBA Calendar</h1>
      </div>
    </div>

    <div class="nav">
      <button type="button" aria-selected="true" onclick="showMod('calendar',this)">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="3" width="13" height="11.5" rx="1.8" stroke="currentColor" stroke-width="1.4" fill="none"/>
            <path d="M1.5 6.5h13" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 1.5v3M11 1.5v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Calendario
        </span>
        <span class="nav-badge" id="bCal">0</span>
      </button>
      <button type="button" aria-selected="false" onclick="showMod('seg',this)">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6.2" stroke="currentColor" stroke-width="1.4" fill="none"/>
            <path d="M8 5v3.8l2.2 1.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Seguimientos
        </span>
        <span class="nav-badge" id="bSeg">0</span>
      </button>
      <button type="button" aria-selected="false" onclick="showMod('brain',this)">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.4" stroke="currentColor" stroke-width="1.3" fill="none"/>
            <circle cx="8" cy="8" r="6.2" stroke="currentColor" stroke-width="1" stroke-dasharray="2.2 2.5"/>
            <circle cx="8" cy="1.8" r="1.1" fill="currentColor"/>
            <circle cx="14.2" cy="8" r="1.1" fill="currentColor"/>
            <circle cx="1.8" cy="8"  r="1.1" fill="currentColor"/>
            <circle cx="8" cy="14.2" r="1.1" fill="currentColor"/>
          </svg>
          Brain
        </span>
        <span class="nav-badge" id="bBrain">0</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="save-row">
        <div class="save-dot" id="saveDot"></div>
        <span class="save-label" id="saveLabel">Listo</span>
      </div>
      <button class="cfg-btn" onclick="document.getElementById('tokenScreen').classList.add('visible')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.8" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="7" cy="7" r="2"   stroke="currentColor" stroke-width="1.3" fill="none"/>
        </svg>
        Configuración
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>

    <!-- ── CALENDARIO ── -->
    <div class="module active" id="mod-calendar">
      <div class="topline">
        <div>
          <p class="eyebrow">Semana laboral</p>
          <h2>Calendario</h2>
        </div>
        <div class="actions">
          <button class="btn ghost small" onclick="changeWeek(-1)">&#8592; Anterior</button>
          <div class="week-label" id="weekLabel"></div>
          <button class="btn ghost small" onclick="changeWeek(1)">Siguiente &#8594;</button>
          <button class="btn secondary small" onclick="goToday()">Hoy</button>
          <button class="btn small" onclick="openAddTask()">+ Tarea</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- ── SEGUIMIENTOS ── -->
    <div class="module" id="mod-seg">
      <div class="topline">
        <div>
          <p class="eyebrow">En curso</p>
          <h2>Seguimientos</h2>
        </div>
        <div class="actions">
          <button class="btn small" onclick="openAddTask(); document.getElementById('tTag').value='seguimiento'">+ Seguimiento</button>
        </div>
      </div>
      <div class="seg-wrap" id="segList"></div>
    </div>

    <!-- ── BRAIN ── -->
    <div class="module" id="mod-brain">
      <div class="topline">
        <div>
          <p class="eyebrow">Sistema nervioso</p>
          <h2>Brain</h2>
        </div>
        <div class="actions">
          <button class="btn small" onclick="openAddNode()">+ Idea</button>
        </div>
      </div>
      <div class="brain-layout">
        <!-- Orbital arena -->
        <div class="orbit-arena" id="orbitArena">
          <svg id="orbitSvg"></svg>
          <div class="nucleus" id="nucleus">WBA</div>
          <div id="orbitNodes"></div>
        </div>
        <!-- Side panel -->
        <div class="brain-panel">
          <div class="brain-card">
            <div class="bc-title">Ideas</div>
            <div class="bc-list" id="brainIdeaList"></div>
          </div>
          <div class="brain-card">
            <div class="bc-title">Tareas activas</div>
            <div class="bc-list" id="brainTaskList"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──
const DATA_FILE = 'data.json';
let GH_TOKEN = '', GH_REPO = 'mjonateca/WBA-CALENDAR', fileSha = null;
let dirty = false, autoTimer = null;

// ── STATE ──
let state = { tasks: [], nodes: [] };
let editTaskId = null, editNodeId = null, weekOffset = 0;

// ── HELPERS ──
const uid    = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const $       = id  => document.getElementById(id);
const DAYS   = ['Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const fmt    = d  => d.toISOString().slice(0,10);
const disp   = ds => { const [,m,d]=ds.split('-'); return `${+d} ${MONTHS[+m-1]}`; };
const esc    = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── TOKEN ──
const DEFAULT_TOKEN = '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';
const DEFAULT_REPO  = 'mjonateca/WBA-CALENDAR';

function loadToken() {
  // Use stored token, fallback to hardcoded default
  GH_TOKEN = localStorage.getItem('wba_token') || DEFAULT_TOKEN;
  GH_REPO  = localStorage.getItem('wba_repo')  || DEFAULT_REPO;
  // Always persist so it survives refreshes
  localStorage.setItem('wba_token', GH_TOKEN);
  localStorage.setItem('wba_repo',  GH_REPO);
  $('repoInput').value = GH_REPO;
  // Never show token screen on load — token is pre-configured
}
function saveToken() {
  const t = $('tokenInput').value.trim() || DEFAULT_TOKEN;
  const r = $('repoInput').value.trim()  || DEFAULT_REPO;
  GH_TOKEN = t; GH_REPO = r;
  localStorage.setItem('wba_token', t); localStorage.setItem('wba_repo', r);
  $('tokenScreen').classList.remove('visible');
  loadFromGH();
}

// ── GITHUB ──
async function loadFromGH() {
  if (!GH_TOKEN) return;
  setStatus('saving','Cargando…');
  try {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${DATA_FILE}`,
      { headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github+json' } });
    if (res.status === 404) { setStatus('ok','Nuevo'); render(); return; }
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    fileSha = data.sha;
    const dec = JSON.parse(atob(data.content.replace(/\n/g,'')));
    state = { tasks: dec.tasks||[], nodes: dec.nodes||[] };
    setStatus('ok','Sincronizado');
  } catch(e) { setStatus('error','Error'); toast('Error: '+e.message); }
  seedOnce(); render();
}

async function push(silent) {
  if (!GH_TOKEN) { $('tokenScreen').classList.add('visible'); return; }
  setStatus('saving','Guardando…');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state,null,2))));
    const body = { message: `sync ${new Date().toISOString().slice(0,16).replace('T',' ')}`, content };
    if (fileSha) body.sha = fileSha;
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${DATA_FILE}`,{
      method:'PUT',
      headers:{ Authorization:`token ${GH_TOKEN}`, Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if (!res.ok) { const e=await res.json(); throw new Error(e.message||res.status); }
    const data = await res.json();
    fileSha = data.content.sha; dirty = false;
    setStatus('ok','Guardado'); if(!silent) toast('Guardado en GitHub ✓');
  } catch(e){ setStatus('error','Error'); toast('Error: '+e.message); }
}

function markDirty() {
  dirty = true; setStatus('saving','Sin guardar');
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { if(dirty && GH_TOKEN) push(true); }, 4000);
}
function setStatus(type,label) {
  $('saveDot').className = 'save-dot '+type;
  $('saveLabel').textContent = label;
}

// ── NAV ──
function showMod(id, btn) {
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.setAttribute('aria-selected','false'));
  $('mod-'+id).classList.add('active'); btn.setAttribute('aria-selected','true');
  if(id==='brain') { setTimeout(initOrbit,60); }
}

// ── WEEK ──
function getWeekDays() {
  const now = new Date(), dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow===0?6:dow-1) + weekOffset*7);
  return Array.from({length:6},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function changeWeek(d) { weekOffset+=d; renderCalendar(); }
function goToday()     { weekOffset=0; renderCalendar(); }

// ── RENDER ──
function render() { renderCalendar(); renderSeg(); renderBrainLists(); renderBadges(); }

function renderBadges() {
  $('bCal').textContent   = state.tasks.filter(t=>!t.done).length;
  $('bSeg').textContent   = state.tasks.filter(t=>t.tag==='seguimiento'&&!t.done).length;
  $('bBrain').textContent = state.nodes.length;
}

function renderCalendar() {
  const days = getWeekDays(), todayStr = fmt(new Date());
  const f=days[0], l=days[5];
  $('weekLabel').textContent = `${f.getDate()} ${MONTHS[f.getMonth()]} – ${l.getDate()} ${MONTHS[l.getMonth()]} ${l.getFullYear()}`;

  $('calGrid').innerHTML = days.map(day => {
    const ds = fmt(day), isToday = ds===todayStr;
    const tasks = state.tasks.filter(t=>t.date===ds);
    const cards = tasks.map(t=>`
      <div class="task-card ${t.done?'done':''}" onclick="openEditTask('${t.id}')">
        <div class="tc-row">
          <div class="tc-check ${t.done?'checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')"></div>
          <span class="tc-title">${esc(t.title)}</span>
        </div>
        ${t.tag==='seguimiento'?`<div><span class="tc-tag">Seguimiento</span></div>`:''}
      </div>`).join('');

    return `
      <div class="cal-col ${isToday?'today':''}">
        <div class="cal-head">
          <span class="cal-dayname">${DAYS[day.getDay()-1]??'Sáb'}</span>
          <span class="cal-daynum">${day.getDate()}</span>
        </div>
        <div class="cal-body">
          ${cards||''}
          <button class="add-day" onclick="openAddTask('${ds}')">+ añadir tarea</button>
        </div>
      </div>`;
  }).join('');
}

function renderSeg() {
  const segs = state.tasks.filter(t=>t.tag==='seguimiento')
    .sort((a,b)=>(a.done-b.done)||a.date.localeCompare(b.date));
  const el = $('segList');
  if(!segs.length){ el.innerHTML=`<div class="seg-empty">No hay seguimientos activos.</div>`; return; }
  el.innerHTML = segs.map(t=>`
    <div class="seg-item ${t.done?'done':''}" onclick="openEditTask('${t.id}')">
      <div class="si-check ${t.done?'checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')"></div>
      <span class="si-title">${esc(t.title)}</span>
      <span class="si-date">${disp(t.date)}</span>
    </div>`).join('');
}

function renderBrainLists() {
  const il = $('brainIdeaList');
  il.innerHTML = state.nodes.length
    ? state.nodes.map(n=>`
        <div class="bc-item">
          <div class="bc-dot" style="background:var(--violet)"></div>
          <div class="bc-body">
            <div class="bc-name">${esc(n.title)}</div>
            ${n.note?`<div class="bc-sub">${esc(n.note.slice(0,55))}${n.note.length>55?'…':''}</div>`:''}
          </div>
          <button class="bc-del" onclick="openEditNode('${n.id}')">✎</button>
        </div>`).join('')
    : `<div class="bc-empty">Sin ideas aún.</div>`;

  const tl = $('brainTaskList');
  const active = state.tasks.filter(t=>!t.done).slice(0,10);
  tl.innerHTML = active.length
    ? active.map(t=>`
        <div class="bc-item">
          <div class="bc-dot" style="background:${t.tag==='seguimiento'?'var(--yellow)':'var(--aqua)'}"></div>
          <div class="bc-body">
            <div class="bc-name">${esc(t.title)}</div>
            <div class="bc-sub">${disp(t.date)}${t.tag?' · '+t.tag:''}</div>
          </div>
        </div>`).join('')
    : `<div class="bc-empty">Sin tareas activas.</div>`;
}

// ── ORBIT ──
let orbitAF = null, orbitAngles = {};

function initOrbit() {
  if(orbitAF) cancelAnimationFrame(orbitAF);
  orbitAngles = {};
  animateOrbit();
}

function animateOrbit() {
  const arena = $('orbitArena');
  if(!arena) return;
  const W = arena.offsetWidth, H = arena.offsetHeight;
  const cx = W/2, cy = H/2;

  // Ideas: inner orbit, Tasks: outer orbit
  const ideaNodes = state.nodes;
  const taskNodes = state.tasks.filter(t=>!t.done).slice(0,12);

  const innerR = Math.min(W,H)*0.28;
  const outerR = Math.min(W,H)*0.43;

  // Init angles
  ideaNodes.forEach((n,i) => {
    if(orbitAngles['i'+n.id]===undefined)
      orbitAngles['i'+n.id] = (i/Math.max(ideaNodes.length,1))*Math.PI*2;
  });
  taskNodes.forEach((t,i) => {
    if(orbitAngles['t'+t.id]===undefined)
      orbitAngles['t'+t.id] = (i/Math.max(taskNodes.length,1))*Math.PI*2;
  });

  // Tick
  ideaNodes.forEach((n,i) => { orbitAngles['i'+n.id] += 0.0006 + i*0.00005; });
  taskNodes.forEach((t,i) => { orbitAngles['t'+t.id] += 0.0004 + i*0.00003; });

  // SVG rings
  const svg = $('orbitSvg');
  svg.innerHTML = `
    <ellipse cx="${cx}" cy="${cy}" rx="${innerR}" ry="${innerR*0.38}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3 5"/>
    <ellipse cx="${cx}" cy="${cy}" rx="${outerR}" ry="${outerR*0.38}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="3 7"/>
  `;

  // Render nodes
  const container = $('orbitNodes');
  container.innerHTML = '';

  function makeNode(x, y, label, dotColor, cls, id, onClick) {
    const div = document.createElement('div');
    div.className = 'orbit-node ' + (cls||'');
    div.style.left = x+'px'; div.style.top = y+'px';
    div.innerHTML = `<div class="orbit-node-inner">
      <span class="orbit-node-dot" style="background:${dotColor}"></span>
      <span style="overflow:hidden;text-overflow:ellipsis;max-width:11rem">${esc(label)}</span>
    </div>`;
    if(onClick) div.addEventListener('click', onClick);
    container.appendChild(div);
  }

  ideaNodes.forEach((n,i) => {
    const a = orbitAngles['i'+n.id];
    const x = cx + Math.cos(a)*innerR;
    const y = cy + Math.sin(a)*innerR*0.38;
    makeNode(x, y, n.title, 'var(--violet)', 'idea', n.id, ()=>openEditNode(n.id));
  });
  taskNodes.forEach((t,i) => {
    const a = orbitAngles['t'+t.id];
    const x = cx + Math.cos(a)*outerR;
    const y = cy + Math.sin(a)*outerR*0.38;
    const color = t.tag==='seguimiento'?'var(--yellow)':'var(--aqua)';
    makeNode(x, y, t.title, color, 'task', t.id, ()=>openEditTask(t.id));
  });

  orbitAF = requestAnimationFrame(animateOrbit);
}

// ── TASK CRUD ──
function openAddTask(ds) {
  editTaskId = null;
  $('tDlgTitle').textContent = 'Nueva tarea';
  $('tTitle').value = '';
  $('tDate').value  = ds||fmt(new Date());
  $('tTag').value   = '';
  $('tDelBtn').style.display = 'none';
  $('taskDlg').showModal();
}
function openEditTask(id) {
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  editTaskId = id;
  $('tDlgTitle').textContent = 'Editar tarea';
  $('tTitle').value = t.title; $('tDate').value = t.date; $('tTag').value = t.tag||'';
  $('tDelBtn').style.display = '';
  $('taskDlg').showModal();
}
function saveTask() {
  const title=$('tTitle').value.trim(), date=$('tDate').value;
  if(!title||!date){ toast('Introduce título y fecha'); return; }
  const tag = $('tTag').value;
  if(editTaskId) {
    const t=state.tasks.find(x=>x.id===editTaskId);
    if(t){ t.title=title; t.date=date; t.tag=tag; }
  } else {
    state.tasks.push({id:uid(),title,date,tag,done:false});
  }
  closeDlg('taskDlg'); markDirty(); render();
}
function deleteTask() {
  if(!editTaskId) return;
  state.tasks = state.tasks.filter(x=>x.id!==editTaskId);
  closeDlg('taskDlg'); markDirty(); render();
}
function toggleTask(id) {
  const t=state.tasks.find(x=>x.id===id);
  if(t){ t.done=!t.done; markDirty(); render(); }
}

// ── NODE CRUD ──
function openAddNode() {
  editNodeId=null; $('nDlgTitle').textContent='Nueva idea';
  $('nTitle').value=''; $('nNote').value='';
  $('nDelBtn').style.display='none'; $('nodeDlg').showModal();
}
function openEditNode(id) {
  const n=state.nodes.find(x=>x.id===id); if(!n) return;
  editNodeId=id; $('nDlgTitle').textContent='Editar idea';
  $('nTitle').value=n.title; $('nNote').value=n.note||'';
  $('nDelBtn').style.display=''; $('nodeDlg').showModal();
}
function saveNode() {
  const title=$('nTitle').value.trim(); if(!title){ toast('Introduce un título'); return; }
  const note=$('nNote').value.trim();
  if(editNodeId){ const n=state.nodes.find(x=>x.id===editNodeId); if(n){n.title=title;n.note=note;} }
  else state.nodes.push({id:uid(),title,note});
  closeDlg('nodeDlg'); markDirty(); render();
}
function deleteNode() {
  if(!editNodeId) return;
  state.nodes=state.nodes.filter(x=>x.id!==editNodeId);
  closeDlg('nodeDlg'); markDirty(); render();
}

// ── UTILS ──
function closeDlg(id) { $(id).close(); }
['taskDlg','nodeDlg'].forEach(id=>$(id).addEventListener('click',e=>{ if(e.target===$(id)) $(id).close(); }));

function toast(msg) {
  const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('on'),2600);
}

function seedOnce() {
  if(state.tasks.length>0) return;
  const now=new Date(), dow=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(dow===0?6:dow-1));
  const wd=n=>{ const d=new Date(mon); d.setDate(mon.getDate()+n); return fmt(d); };
  state.tasks=[
    {id:uid(),title:'Compartir post Ofi-Despedida Ana',               date:wd(2),tag:'',           done:false},
    {id:uid(),title:'Enviar Propuestas SGAs',                          date:wd(2),tag:'',           done:false},
    {id:uid(),title:'Seguimiento Cambios Bikinis Samantha Agua Menta', date:wd(2),tag:'seguimiento',done:false},
    {id:uid(),title:'Seguimiento Sandalias roxy Alexandra',            date:wd(4),tag:'seguimiento',done:false},
  ];
}

// ── INIT ──
loadToken();  // always sets GH_TOKEN (hardcoded default)
loadFromGH(); // always load from GitHub
</script>
</body>
